apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-gpt-oss-20b-config
  namespace: vllm-gpt-oss-20b-dev
  labels:
    app.kubernetes.io/name: vllm-gpt-oss-20b
    app.kubernetes.io/instance: gpt-oss-20b-dev
    app.kubernetes.io/component: inference
    app.kubernetes.io/part-of: vllm
data:
  blackwell.yaml: |
    host: 0.0.0.0
    port: 8000
    max-model-len: 4096
    max-num-batched-tokens: 1024
    max-num-seqs: 1
    max-cudagraph-capture-size: 256
    gpu-memory-utilization: 0.97
    stream-interval: 20
    tensor-parallel-size: 1
    no-enable-prefix-caching: true
    kv-cache-dtype: fp8
    enforce-eager: true
  hopper-like.yaml: |
    host: 0.0.0.0
    port: 8000
    max-model-len: 4096
    max-num-batched-tokens: 1024
    max-num-seqs: 1
    max-cudagraph-capture-size: 256
    gpu-memory-utilization: 0.97
    stream-interval: 20
    tensor-parallel-size: 1
    no-enable-prefix-caching: true
    enforce-eager: true
  launch-vllm.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    mkdir -p "${HF_HOME:-/models/hf-cache}" /tmp/triton /models/tiktoken

    if command -v curl >/dev/null 2>&1; then
      if [ ! -f /models/tiktoken/o200k_base.tiktoken ]; then
        curl -fsSL -o /models/tiktoken/o200k_base.tiktoken \
          https://openaipublic.blob.core.windows.net/encodings/o200k_base.tiktoken || true
      fi
      if [ ! -f /models/tiktoken/cl100k_base.tiktoken ]; then
        curl -fsSL -o /models/tiktoken/cl100k_base.tiktoken \
          https://openaipublic.blob.core.windows.net/encodings/cl100k_base.tiktoken || true
      fi
    fi

    if [ -f /models/tiktoken/o200k_base.tiktoken ] && [ -f /models/tiktoken/cl100k_base.tiktoken ]; then
      export TIKTOKEN_ENCODINGS_BASE=/models/tiktoken
    fi

    COMPUTE_CAPABILITY="${COMPUTE_CAPABILITY_OVERRIDE:-$(nvidia-smi -i 0 --query-gpu=compute_cap --format=csv,noheader | tr -d '[:space:]')}"
    CONFIG_PATH="/config/hopper-like.yaml"

    case "${COMPUTE_CAPABILITY}" in
      10.*|12.*)
        # Consumer Blackwell GPUs may report 12.x; treat them like Blackwell unless you need to override.
        export VLLM_USE_FLASHINFER_MOE_MXFP4_MXFP8=1
        CONFIG_PATH="/config/blackwell.yaml"
        ;;
    esac

    exec vllm serve openai/gpt-oss-20b \
      --config "${CONFIG_PATH}" \
      --download-dir /models/hf-cache \
      --served-model-name gpt-oss-20b \
      --tool-call-parser openai \
      --enable-auto-tool-choice
