apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vllm-gpt-oss-20b-ingressroute
  namespace: vllm-gpt-oss-20b-dev
  labels:
    app.kubernetes.io/name: vllm-gpt-oss-20b
    app.kubernetes.io/instance: gpt-oss-20b-dev
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: vllm
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`vllm-gpt-oss.home.nerdylyonsden.io`)
      kind: Rule
      services:
        - name: vllm-gpt-oss-20b
          port: 8000
  tls:
    secretName: prod-apps-certificate-secret
