images:
  pullPolicy: IfNotPresent

createAggregateRoles: false
singleNamespace: true

workflow:
  serviceAccount:
    create: true
    name: argo-workflow
  rbac:
    create: true

controller:
  replicas: 1
  parallelism: 6
  namespaceParallelism: 3
  workflowWorkers: 4
  workflowTTLWorkers: 2
  podCleanupWorkers: 2
  cronWorkflowWorkers: 2
  resourceRateLimit:
    limit: 2
    burst: 4
  logging:
    level: info
    format: json
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  pdb:
    enabled: false
  workflowRestrictions:
    templateReferencing: Secure
  workflowDefaults:
    spec:
      serviceAccountName: argo-workflow
      podGC:
        strategy: OnWorkflowCompletion
  retentionPolicy:
    completed: 50
    failed: 20
    errored: 20
  nodeEvents:
    enabled: false
  workflowEvents:
    enabled: false
  clusterWorkflowTemplates:
    enabled: false

  # Enable this once you have a shared PostgreSQL instance for workflow archive
  # and offloaded node status. This repo does not currently define one for
  # Argo Workflows, so leave it disabled until the backing service exists.
  # persistence:
  #   archive: true
  #   nodeStatusOffLoad: true
  #   postgresql:
  #     host: postgres.example.internal
  #     port: 5432
  #     database: argo_workflows
  #     tableName: argo_workflows
  #     userNameSecret:
  #       name: argo-workflows-postgres
  #       key: username
  #     passwordSecret:
  #       name: argo-workflows-postgres
  #       key: password
  #     ssl: true
  #     sslMode: require

mainContainer:
  imagePullPolicy: IfNotPresent

executor:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

server:
  replicas: 1
  secure: false
  authModes:
    - server
  logging:
    level: info
    format: json
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
  pdb:
    enabled: false
  livenessProbe:
    enabled: true
  ingress:
    enabled: false
  clusterWorkflowTemplates:
    enabled: false

useStaticCredentials: true
artifactRepository:
  archiveLogs: true
  s3:
    bucket: argo-workflows-prod
    endpoint: rustfs-s3.home.nerdylyonsden.io
    insecure: false
    region: us-east-1
    accessKeySecret:
      name: argo-workflows-artifacts
      key: accesskey
    secretKeySecret:
      name: argo-workflows-artifacts
      key: secretkey
