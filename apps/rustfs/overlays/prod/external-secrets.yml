apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rustfs-prod-credentials
  namespace: rustfs-prod
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend-rustfs-prod
    kind: ClusterSecretStore
  target:
    name: rustfs-prod-credentials
    creationPolicy: Owner
  data:
    - secretKey: RUSTFS_ACCESS_KEY
      remoteRef:
        key: secret/data/rustfs-prod-credentials
        property: access_key
    - secretKey: RUSTFS_SECRET_KEY
      remoteRef:
        key: secret/data/rustfs-prod-credentials
        property: secret_key
